name: Release TubeSub

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gtk4
          mingw-w64-x86_64-libadwaita
          mingw-w64-x86_64-pkg-config
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-toolchain
          mingw-w64-x86_64-rust
        
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
          
    - name: Build
      shell: msys2 {0}
      run: |
        export PATH="/mingw64/bin:$PATH"
        export PKG_CONFIG_PATH="/mingw64/lib/pkgconfig:/mingw64/share/pkgconfig"
        export PKG_CONFIG_ALLOW_CROSS=1
        
        rustc --version
        cargo --version

        pkg-config --modversion gtk4
        pkg-config --modversion libadwaita-1

        cargo build --release

        # Bundle DLLs with the executable
        mkdir -p release
        cp target/release/tubesub.exe release/

        # Copy runtime DLL dependencies automatically
        ldd target/release/tubesub.exe | awk '/\/mingw64\/bin\// {print $3}' | sort -u | xargs -I{} cp "{}" release/

        # Create zip archive
        cd release
        7z a ../tubesub-windows-x86_64.zip *
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: tubesub-windows-x86_64.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
